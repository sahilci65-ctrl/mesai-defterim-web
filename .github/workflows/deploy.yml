name: Deploy to GitHub Pages

on:
  # Push ile trigger et
  push:
    branches: [ main ]
  # Manuel çalıştırmaya izin ver
  workflow_dispatch:

# GITHUB_TOKEN izinleri
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda bir deployment çalışsın
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  BUILD_PATH: "."

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4

      - name: Install, build, and upload your site
        uses: withastro/action@v2
        with:
          path: ${{ env.BUILD_PATH }}

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
